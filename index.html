<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zlice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8F0;
    --cream-card: #FFF3E3;
    --sky-top: #CDEBFB;
    --sky-bottom: #FBEFDD;
    --pink: #F7B6C2;
    --pink-dark: #EF98AA;
    --peach: #FFD3AE;
    --mint: #BFEAD5;
    --mint-dark: #93D6B5;
    --lavender: #D9CFF2;
    --brown: #8A6754;
    --brown-dark: #5B4636;
    --white: #FFFFFF;
  }

  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top), var(--cream));
    font-family: 'Quicksand', sans-serif;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    gap: 14px;
    box-sizing: border-box;
    padding: 14px;
  }

  #cameraPanel {
    width: 50%;
    height: 100%;
    overflow: hidden;
    background: #000;
    position: relative;
    border-radius: 26px;
    border: 6px solid var(--white);
    box-shadow: 0 8px 0 rgba(139, 107, 84, 0.18), 0 10px 24px rgba(0,0,0,0.12);
  }
  #cameraPanel::after {
    content: "👋 YOU";
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    background: var(--cream);
    color: var(--brown-dark);
    font-family: 'Pixelify Sans', sans-serif;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 14px;
    border: 3px solid var(--brown-dark);
    box-shadow: 0 3px 0 rgba(0,0,0,0.12);
    z-index: 3;
    pointer-events: none;
  }
  #webcam {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror the camera preview only */
  }

  #gamePanel {
    width: 50%;
    height: 100%;
    position: relative;
    overflow: hidden;
    border-radius: 26px;
    border: 6px solid var(--white);
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 78%);
    box-shadow: 0 8px 0 rgba(139, 107, 84, 0.18), 0 10px 24px rgba(0,0,0,0.12);
  }

  /* ---------- decorative background scenery (purely cosmetic) ---------- */
  .scene-bg { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50px;
    filter: drop-shadow(0 4px 0 rgba(255,255,255,0.5));
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute; background: inherit; border-radius: 50%;
  }
  .cloud1 { width: 90px; height: 30px; top: 8%; left: -20%; animation: driftCloud 26s linear infinite; }
  .cloud1::before { width: 46px; height: 46px; top: -22px; left: 10px; }
  .cloud1::after { width: 34px; height: 34px; top: -14px; left: 48px; }
  .cloud2 { width: 70px; height: 24px; top: 22%; left: -30%; animation: driftCloud 34s linear infinite; animation-delay: -10s; }
  .cloud2::before { width: 34px; height: 34px; top: -16px; left: 8px; }
  .cloud2::after { width: 26px; height: 26px; top: -10px; left: 36px; }
  .cloud3 { width: 60px; height: 20px; top: 4%; left: -40%; animation: driftCloud 30s linear infinite; animation-delay: -20s; }
  .cloud3::before { width: 28px; height: 28px; top: -14px; left: 6px; }
  .cloud3::after { width: 20px; height: 20px; top: -8px; left: 28px; }
  @keyframes driftCloud { from { transform: translateX(0); } to { transform: translateX(160vw); } }

  .grass {
    position: absolute; left: 0; right: 0; bottom: 0; height: 12%;
    background: linear-gradient(180deg, var(--mint), var(--mint-dark));
    -webkit-mask-image: repeating-linear-gradient(90deg, #000 0 14px, transparent 14px 16px);
    mask-image: repeating-linear-gradient(90deg, #000 0 14px, transparent 14px 16px);
  }
  .grass::before {
    content: ""; position: absolute; left: 0; right: 0; top: -6px; height: 10px;
    background: var(--mint-dark);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    /* no CSS mirror here — this canvas is a normal, non-mirrored view.
       hand-tracking x is flipped manually in JS instead (see main.js mainLoop). */
  }

  /* Fix F8: HTML-based HUD instead of canvas text — crisper, and lets us
     add a real "Play Again" button instead of a keyboard-only restart. */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 16px; box-sizing: border-box;
    pointer-events: none; z-index: 5;
  }
  #hud .hud-item {
    display: inline-block;
    font-family: 'Pixelify Sans', sans-serif;
    font-size: 16px; font-weight: 500;
    color: var(--brown-dark);
    background: var(--cream);
    border: 3px solid var(--brown-dark);
    border-radius: 14px;
    padding: 8px 14px;
    box-shadow: 0 4px 0 rgba(139,107,84,0.25);
    font-variant-numeric: tabular-nums;
  }
  #scoreDisplay::before { content: "⭐ "; }
  #timerDisplay::before { content: "⏱ "; }
  #timerDisplay.low-time { color: #E0715C; border-color: #E0715C; animation: pulseWarn 0.6s ease infinite; }
  @keyframes pulseWarn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

  #comboText {
    position: absolute; top: 62px; left: 16px;
    font-family: 'Pixelify Sans', sans-serif; font-size: 14px;
    color: var(--brown-dark); background: var(--pink);
    border: 3px solid var(--brown-dark); border-radius: 12px;
    padding: 5px 12px;
    box-shadow: 0 3px 0 rgba(139,107,84,0.25);
    pointer-events: none; z-index: 5; opacity: 0;
    transition: opacity 0.15s ease, transform 0.15s ease;
    transform: scale(0.85);
  }
  #comboText::before { content: "🔥 "; }
  #comboText[style*="opacity: 1"] { transform: scale(1); }

  #gamePanel.bomb-flash { animation: flashSoft 0.3s ease-out; }
  @keyframes flashSoft {
    0%   { box-shadow: inset 0 0 0 9999px rgba(255,180,140,0.45); }
    100% { box-shadow: inset 0 0 0 9999px rgba(255,180,140,0); }
  }

  /* ---------- floating score popups (UI only) ---------- */
  .score-popup {
    position: absolute;
    font-family: 'Pixelify Sans', sans-serif;
    font-weight: 500; font-size: 20px;
    color: var(--pink-dark);
    text-shadow: 0 2px 0 rgba(255,255,255,0.9);
    pointer-events: none; z-index: 6;
    transform: translate(-50%, -50%);
    animation: popupFloat 0.9s ease-out forwards;
  }
  @keyframes popupFloat {
    0%   { opacity: 0; transform: translate(-50%, -40%) scale(0.6); }
    18%  { opacity: 1; transform: translate(-50%, -60%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -140%) scale(1.05); }
  }

  /* ---------- reusable cute critter component ---------- */
  .critter { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .critter .ear {
    position: absolute; width: 20px; height: 20px; top: -8px;
    background: var(--white); border: 4px solid var(--brown-dark); border-radius: 6px;
  }
  .critter .ear-l { left: 2px; transform: rotate(-25deg); }
  .critter .ear-r { right: 2px; transform: rotate(25deg); }
  .critter .body {
    position: absolute; inset: 10px 1px 0 1px;
    background: var(--white); border: 4px solid var(--brown-dark);
    border-radius: 50% 50% 45% 45% / 58% 58% 42% 42%;
  }
  .critter .cheek {
    position: absolute; width: 11px; height: 7px; bottom: 21px;
    background: var(--pink); border-radius: 50%; opacity: 0.85;
  }
  .critter .cheek-l { left: 5px; }
  .critter .cheek-r { right: 5px; }
  .critter .eye {
    position: absolute; width: 7px; height: 9px; top: 27px;
    background: var(--brown-dark); border-radius: 50%;
    transition: all 0.15s ease;
  }
  .critter .eye-l { left: 17px; }
  .critter .eye-r { right: 17px; }
  .critter .nose {
    position: absolute; width: 8px; height: 6px; top: 35px; left: 50%;
    transform: translateX(-50%);
    background: var(--pink-dark); border-radius: 50%;
  }
  .critter .mouth {
    position: absolute; width: 14px; height: 7px; top: 40px; left: 50%;
    transform: translateX(-50%);
    border-bottom: 3px solid var(--brown-dark); border-radius: 0 0 10px 10px;
    transition: all 0.15s ease;
  }
  .critter--cat .ear { background: var(--peach); }
  .critter--bunny .ear { width: 13px; height: 32px; top: -24px; border-radius: 10px; background: var(--pink); }
  .critter--bunny .ear-l { left: 11px; transform: rotate(-8deg); }
  .critter--bunny .ear-r { right: 11px; transform: rotate(8deg); }
  .critter--hamster .ear { width: 13px; height: 13px; top: -3px; background: var(--peach); }
  .critter--hamster .body { background: var(--peach); }

  .critter--float { animation: floatY 3s ease-in-out infinite; }
  @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .bounce { animation: critterBounce 0.5s ease; }
  @keyframes critterBounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.15, 0.85); }
    60%  { transform: scale(0.95, 1.08); }
    100% { transform: scale(1); }
  }

  /* reaction states, shared by the in-game mascot and the game-over critter */
  .reactive-critter[data-state="happy"] .eye {
    height: 4px; top: 29px; background: transparent;
    border-bottom: 3px solid var(--brown-dark); border-radius: 0 0 8px 8px;
  }
  .reactive-critter[data-state="happy"] .mouth {
    width: 20px; height: 12px; top: 38px;
    border-bottom: 4px solid var(--brown-dark); border-radius: 0 0 14px 14px;
  }
  .reactive-critter[data-state="sad"] .eye { transform: scaleY(0.55); }
  .reactive-critter[data-state="sad"] .mouth {
    border-bottom: none; top: 44px;
    border-top: 3px solid var(--brown-dark); border-radius: 10px 10px 0 0;
  }
  .reactive-critter[data-state="sad"]::after {
    content: "💧"; position: absolute; font-size: 11px; top: 30px; left: 6px;
    animation: tearDrop 0.8s ease-in;
  }
  @keyframes tearDrop {
    0% { opacity: 0; transform: translateY(-4px); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translateY(10px); }
  }
  .reactive-critter[data-state="peek"] { animation: peekBounce 0.9s ease; }
  @keyframes peekBounce {
    0%, 100% { transform: translateY(0) rotate(0); }
    30% { transform: translateY(-14px) rotate(-4deg); }
    60% { transform: translateY(-6px) rotate(3deg); }
  }

  #mascot {
    position: absolute; left: 16px; bottom: calc(12% + 10px); z-index: 4;
    width: 58px; height: 58px; pointer-events: none;
  }

  /* ---------- start screen ---------- */
  #startScreen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 10; text-align: center;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 78%);
  }
  .start-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 0 24px; box-sizing: border-box; max-width: 90%;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Pixelify Sans', sans-serif; font-size: 14px;
    color: var(--brown-dark); background: var(--cream);
    border: 3px solid var(--brown-dark); border-radius: 14px;
    padding: 7px 16px;
    box-shadow: 0 4px 0 rgba(139,107,84,0.25);
  }
  #highScoreStart::before { content: "⭐ "; }

  .game-title {
    font-family: 'Pixelify Sans', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: clamp(36px, 6vw, 58px);
    color: var(--pink);
    margin: 0;
    -webkit-text-stroke: 3px var(--white);
    paint-order: stroke fill;
    text-shadow: 3px 3px 0 var(--brown-dark), 6px 6px 0 rgba(0,0,0,0.1);
  }
  .game-title .accent {
    color: var(--brown-dark);
    -webkit-text-stroke: 3px var(--white);
  }

  .game-subtitle {
    max-width: 420px; color: var(--brown);
    font-size: 15px; line-height: 1.5; margin: 0;
  }

  .critter-row { display: flex; align-items: center; gap: 22px; margin-top: 4px; }

  .btn {
    font-family: 'Pixelify Sans', sans-serif;
    font-size: 17px; letter-spacing: 0.3px;
    border: 4px solid var(--brown-dark); border-radius: 22px;
    padding: 15px 30px; cursor: pointer;
    color: var(--brown-dark);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .btn-play { background: var(--pink); box-shadow: 0 6px 0 var(--pink-dark); }
  .btn-play:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 0 var(--pink-dark); }
  .btn-play:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 var(--pink-dark); }
  .btn-again { background: var(--mint); box-shadow: 0 6px 0 var(--mint-dark); }
  .btn-again:hover { transform: translateY(-2px); box-shadow: 0 8px 0 var(--mint-dark); }
  .btn-again:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--mint-dark); }

  .status-msg { min-height: 18px; color: #C46B6B; font-size: 13px; margin: 0; }

  /* ---------- game-over screen ---------- */
  #gameOverScreen {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(200, 180, 210, 0.28);
    z-index: 20; padding: 20px; box-sizing: border-box;
  }
  .game-over-card {
    position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--cream-card);
    border: 5px solid var(--brown-dark);
    border-radius: 26px;
    padding: 26px 30px 24px;
    box-shadow: 0 8px 0 rgba(139,107,84,0.3), 0 14px 26px rgba(0,0,0,0.15);
    max-width: 88%;
  }
  .game-over-card #gameOverCritter { margin-top: 6px; margin-bottom: 4px; }
  .game-over-card h2 {
    font-family: 'Pixelify Sans', sans-serif;
    font-size: 24px; color: var(--brown-dark); margin: 0 0 6px;
  }
  .game-over-card p { margin: 2px 0; color: var(--brown); font-size: 14px; }
  .game-over-card #highScoreText { color: var(--pink-dark); font-weight: 700; }
  .game-over-card .btn-again { margin-top: 14px; }
  .sparkle { position: absolute; top: -10px; font-size: 18px; }
  .sparkle-l { left: 14px; }
  .sparkle-r { right: 14px; }
</style>
</head>
<body>
<div id="stage">
  <div id="cameraPanel">
    <video id="webcam" autoplay playsinline width="1280" height="720"></video>
  </div>
  <div id="gamePanel">
    <div class="scene-bg">
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
      <div class="cloud cloud3"></div>
      <div class="grass"></div>
    </div>
    <canvas id="overlay"></canvas>
    <div id="mascot" class="critter critter--cat reactive-critter" data-state="idle">
      <span class="ear ear-l"></span>
      <span class="ear ear-r"></span>
      <span class="body"></span>
      <span class="cheek cheek-l"></span>
      <span class="cheek cheek-r"></span>
      <span class="eye eye-l"></span>
      <span class="eye eye-r"></span>
      <span class="nose"></span>
      <span class="mouth"></span>
    </div>
    <div id="hud">
      <div class="hud-item" id="scoreDisplay">Score: 0</div>
      <div class="hud-item" id="timerDisplay">0:45</div>
    </div>
    <div id="comboText"></div>
    <div id="gameOverScreen">
      <div class="game-over-card">
        <span class="sparkle sparkle-l">✨</span>
        <span class="sparkle sparkle-r">✨</span>
        <h2 id="resultTitle">Time's Up!</h2>
        <p id="resultSubtitle"></p>
        <p id="finalScoreText"></p>
        <p id="highScoreText"></p>
        <div id="gameOverCritter" class="critter critter--cat reactive-critter" data-state="idle">
          <span class="ear ear-l"></span>
          <span class="ear ear-r"></span>
          <span class="body"></span>
          <span class="cheek cheek-l"></span>
          <span class="cheek cheek-r"></span>
          <span class="eye eye-l"></span>
          <span class="eye eye-r"></span>
          <span class="nose"></span>
          <span class="mouth"></span>
        </div>
        <button id="playAgainBtn" class="btn btn-again">Play Again ↻</button>
      </div>
    </div>
  </div>
  <div id="startScreen">
    <div class="scene-bg">
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
      <div class="cloud cloud3"></div>
      <div class="grass"></div>
    </div>
    <div class="start-content">
      <div class="badge"><span id="highScoreStart">High Score: 0</span></div>
      <h1 class="game-title">🍉 Z<span class="accent">lice</span></h1>
      <p class="game-subtitle">Swipe your index finger fast across fruit to slice it. Avoid bombs — they cost you points. Slice as much as you can before the timer runs out!</p>
      <div class="critter-row">
        <div class="critter critter--bunny critter--float">
          <span class="ear ear-l"></span>
          <span class="ear ear-r"></span>
          <span class="body"></span>
          <span class="cheek cheek-l"></span>
          <span class="cheek cheek-r"></span>
          <span class="eye eye-l"></span>
          <span class="eye eye-r"></span>
          <span class="nose"></span>
          <span class="mouth"></span>
        </div>
        <button id="startBtn" class="btn btn-play">Allow Camera &amp; Play ▶</button>
        <div class="critter critter--hamster critter--float" style="animation-delay:0.5s">
          <span class="ear ear-l"></span>
          <span class="ear ear-r"></span>
          <span class="body"></span>
          <span class="cheek cheek-l"></span>
          <span class="cheek cheek-r"></span>
          <span class="eye eye-l"></span>
          <span class="eye eye-r"></span>
          <span class="nose"></span>
          <span class="mouth"></span>
        </div>
      </div>
      <p id="statusMsg" class="status-msg"></p>
    </div>
  </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
